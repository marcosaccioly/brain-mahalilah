<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <meta
      name="description"
      content="Sessão terapêutica com Denise Mascarenhas — Instituto Maha Lilah"
    />
    <title>Denise Mascarenhas — Maha Lilah</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0720;
        --surface: #1a0d35;
        --surface2: #241547;
        --accent: #7c3aed;
        --accent-light: #a78bfa;
        --text: #e2d9f3;
        --text-muted: #9580c0;
        --bubble-user: #3b1d8a;
        --bubble-ai: #1e1040;
        --border: #2d1b5e;
        --lotus: #f472b6;
      }

      html,
      body {
        height: 100%;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        max-width: 720px;
        margin: 0 auto;
      }

      /* Header */
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      header .lotus {
        font-size: 1.6rem;
        line-height: 1;
      }

      header .info h1 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--accent-light);
      }

      header .info p {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      header button#reset-btn {
        margin-left: auto;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 6px 12px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.75rem;
        transition: all 0.2s;
      }

      header button#reset-btn:hover {
        border-color: var(--accent);
        color: var(--accent-light);
      }

      /* Messages */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        scroll-behavior: smooth;
      }

      #messages::-webkit-scrollbar {
        width: 4px;
      }
      #messages::-webkit-scrollbar-track {
        background: transparent;
      }
      #messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .message {
        display: flex;
        gap: 8px;
        animation: fadeIn 0.25s ease;
        max-width: 85%;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .message.ai {
        align-self: flex-start;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        flex-shrink: 0;
        align-self: flex-end;
      }

      .message.ai .avatar {
        background: linear-gradient(135deg, var(--accent), var(--lotus));
      }

      .message.user .avatar {
        background: var(--surface2);
      }

      .bubble {
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 0.9rem;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message.ai .bubble {
        background: var(--bubble-ai);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
        color: var(--text);
      }

      .message.user .bubble {
        background: var(--bubble-user);
        border-bottom-right-radius: 4px;
        color: var(--text);
      }

      .bubble strong {
        color: var(--accent-light);
      }

      .bubble em {
        color: var(--text-muted);
      }

      .bubble code {
        background: var(--surface2);
        padding: 1px 6px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.85em;
        color: var(--accent-light);
      }

      /* Typing indicator */
      .typing-indicator .bubble {
        display: flex;
        gap: 5px;
        align-items: center;
        padding: 14px 18px;
      }

      .typing-indicator .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        animation: bounce 1.2s infinite;
      }

      .typing-indicator .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-6px);
        }
      }

      /* Welcome */
      #welcome {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 32px 24px;
        text-align: center;
      }

      #welcome .lotus-big {
        font-size: 3.5rem;
        filter: drop-shadow(0 0 20px #a855f780);
      }

      #welcome h2 {
        font-size: 1.3rem;
        color: var(--accent-light);
        font-weight: 600;
      }

      #welcome p {
        color: var(--text-muted);
        font-size: 0.9rem;
        line-height: 1.6;
        max-width: 340px;
      }

      #welcome .quick-commands {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-top: 8px;
      }

      .quick-cmd {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--accent-light);
        padding: 6px 14px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.2s;
        font-family: monospace;
      }

      .quick-cmd:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      /* Input */
      #input-area {
        padding: 12px 16px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }

      #msg-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 22px;
        padding: 10px 16px;
        font-size: 0.9rem;
        resize: none;
        max-height: 120px;
        min-height: 42px;
        outline: none;
        font-family: inherit;
        line-height: 1.4;
        transition: border-color 0.2s;
      }

      #msg-input:focus {
        border-color: var(--accent);
      }

      #msg-input::placeholder {
        color: var(--text-muted);
      }

      #send-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--accent);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.2s, transform 0.1s;
      }

      #send-btn:hover {
        background: #6d28d9;
      }

      #send-btn:active {
        transform: scale(0.93);
      }

      #send-btn:disabled {
        background: var(--surface2);
        cursor: not-allowed;
      }

      #send-btn svg {
        width: 18px;
        height: 18px;
        fill: #fff;
      }

      #error-toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: #7f1d1d;
        color: #fca5a5;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 0.85rem;
        display: none;
        z-index: 100;
        white-space: nowrap;
      }

      @media (min-width: 720px) {
        #app {
          border-left: 1px solid var(--border);
          border-right: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <span class="lotus">🪷</span>
        <div class="info">
          <h1>Denise Mascarenhas</h1>
          <p>Instituto Maha Lilah · IA</p>
        </div>
        <button id="reset-btn" title="Reiniciar conversa">↺ Reiniciar</button>
      </header>

      <div id="welcome">
        <div class="lotus-big">🪷</div>
        <h2>Bem-vindo ao Grande Jogo do Autoconhecimento</h2>
        <p>
          O Maha Lilah é um mapa do despertar — mais que um jogo, é um espelho
          da sua alma.
        </p>
        <div class="quick-commands">
          <button class="quick-cmd" data-cmd="*sessao">*sessao</button>
          <button class="quick-cmd" data-cmd="*diagnostico-ego">*diagnostico-ego</button>
          <button class="quick-cmd" data-cmd="*meditacao">*meditacao</button>
          <button class="quick-cmd" data-cmd="*help">*help</button>
        </div>
      </div>

      <div id="messages" style="display: none"></div>

      <div id="input-area">
        <textarea
          id="msg-input"
          placeholder="Digite uma mensagem ou comando (*sessao, *help…)"
          rows="1"
        ></textarea>
        <button id="send-btn" aria-label="Enviar">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>

    <div id="error-toast"></div>

    <script>
      // ── Config ──────────────────────────────────────────────
      // Funciona tanto em Vercel (/api/chat) quanto no servidor Express local (/chat)
      const API_URL = "/api/chat";

      // Histórico da conversa armazenado no cliente (funciona em Vercel serverless)
      let history = JSON.parse(localStorage.getItem("denise_history") || "[]");
      let isLoading = false;

      // ── DOM ─────────────────────────────────────────────────
      const messagesEl = document.getElementById("messages");
      const welcomeEl = document.getElementById("welcome");
      const inputEl = document.getElementById("msg-input");
      const sendBtn = document.getElementById("send-btn");
      const resetBtn = document.getElementById("reset-btn");
      const errorToast = document.getElementById("error-toast");

      // Restaurar conversa anterior ao carregar a página
      if (history.length > 0) {
        showMessages();
        history.forEach((msg) => {
          if (msg.role === "user") renderMessage("user", msg.content);
          else if (msg.role === "assistant") renderMessage("ai", msg.content);
        });
      }

      // ── Auto-resize textarea ─────────────────────────────────
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
      });

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      sendBtn.addEventListener("click", sendMessage);
      resetBtn.addEventListener("click", resetSession);

      document.querySelectorAll(".quick-cmd").forEach((btn) => {
        btn.addEventListener("click", () => {
          inputEl.value = btn.dataset.cmd;
          sendMessage();
        });
      });

      // ── Render helpers ───────────────────────────────────────
      function showMessages() {
        welcomeEl.style.display = "none";
        messagesEl.style.display = "flex";
      }

      function renderMarkdown(text) {
        return text
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.+?)\*/g, "<em>$1</em>")
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\n/g, "<br>");
      }

      function renderMessage(role, text) {
        showMessages();
        const msg = document.createElement("div");
        msg.className = `message ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "ai" ? "🪷" : "👤";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = renderMarkdown(text);

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function addTypingIndicator() {
        showMessages();
        const msg = document.createElement("div");
        msg.className = "message ai typing-indicator";
        msg.id = "typing";
        msg.innerHTML = `
          <div class="avatar">🪷</div>
          <div class="bubble">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>`;
        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function removeTypingIndicator() {
        document.getElementById("typing")?.remove();
      }

      function showError(msg) {
        errorToast.textContent = msg;
        errorToast.style.display = "block";
        setTimeout(() => (errorToast.style.display = "none"), 4000);
      }

      // ── Send message ─────────────────────────────────────────
      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isLoading) return;

        isLoading = true;
        sendBtn.disabled = true;
        inputEl.value = "";
        inputEl.style.height = "auto";

        renderMessage("user", text);
        addTypingIndicator();

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            // Envia o histórico junto — Vercel não tem estado entre chamadas
            body: JSON.stringify({ message: text, history }),
          });

          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();

          // Atualiza e persiste o histórico
          history = data.history;
          localStorage.setItem("denise_history", JSON.stringify(history));

          removeTypingIndicator();
          renderMessage("ai", data.response);
        } catch (err) {
          removeTypingIndicator();
          showError("Erro ao conectar. Verifique a conexão e tente novamente.");
          console.error(err);
        } finally {
          isLoading = false;
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      // ── Reset ─────────────────────────────────────────────────
      function resetSession() {
        history = [];
        localStorage.removeItem("denise_history");
        messagesEl.innerHTML = "";
        messagesEl.style.display = "none";
        welcomeEl.style.display = "flex";
      }

      // ── Service Worker ───────────────────────────────────────
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/sw.js")
          .catch((e) => console.warn("SW não registrado:", e));
      }

      inputEl.focus();
    </script>
  </body>
</html>
